name: Job Alert

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # manual run button in GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Restore seen-jobs cache so we don't re-alert on old postings ──
      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job checker
        env:
          WD_TENANT:  ${{ secrets.WD_TENANT }}
          WD_SERVER:  ${{ secrets.WD_SERVER }}
          WD_SITE:    ${{ secrets.WD_SITE }}
          KEYWORDS:   ${{ secrets.KEYWORDS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          DATA_FILE:  data/seen_jobs.json
        run: python src/checker.py

      # ── Save updated seen-jobs so the next run knows what was already alerted ──
      - name: Save seen jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
